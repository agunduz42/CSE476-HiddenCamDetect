capture:
  interface: null
  duration: 30
  output_dir: "data/raw_pcap"
  bpf_filter: ""
  packet_count: 0
  promiscuous: true
  snaplen: 65535
  
  # Device limit
  max_devices: 5  # Track at most 5 devices
  
  statistics:
    enabled: true
    interval: 60
    
  device_tracking:
    enabled: true
    group_by_mac: true
    include_local: true